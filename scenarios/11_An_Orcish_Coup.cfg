#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=11_An_Orcish_Coup
    name= _ "An Orcish Coup"
    {MAP 11_An_Orcish_Coup.map}
    next_scenario=12_Assault_on_Alduin

    {TURNS 42 38 34}

    {SCENARIO_MUSIC "northerners.ogg"}
    {EXTRA_SCENARIO_MUSIC "siege_of_laurelmor.ogg"}
    {EXTRA_SCENARIO_MUSIC "legends_of_the_north.ogg"}

    {STORYTXT_AN_ORCISH_COUP}

    {DUSK}
    {DUSK}
    {FIRST_WATCH}
    {FIRST_WATCH}
    {FIRST_WATCH}
    {SECOND_WATCH}
    {SECOND_WATCH}
    {SECOND_WATCH}
    {DAWN}
    {DAWN}
    {MORNING}
    {AFTERNOON}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        team_name=undead
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        {GOLD 200 180 160}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    [side]
        side=2
        save_id=Tanar
        controller=human
        team_name=undead
        user_team_name= _ "team_name^Tanar"
        {LONG_FLAG}

        {GOLD 200 180 160}
        recruit=Orcish Grunt,Orcish Archer,Orcish Assassin,Wolf Rider

        # wmllint: recognize Tanar
        {CHARACTER_STATS_TANAR_AS_LEADER}
    [/side]

    [side]
        side=3
        team_name=orcs
        user_team_name= _ "team_name^Orcs"
        {RAGGED_FLAG}

        {GOLD 100 120 140}
        {INCOME 12 18 24}
        recruit=Orcish Grunt,Orcish Archer,Orcish Assassin,Orcish Warrior,Orcish Crossbowman,Orcish Slayer

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.35}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   offensive}
        [/ai]

        canrecruit=yes
        type=Orcish Sovereign
        id=Kogran
        name= _ "Kogran"
        unrenamable=yes
        facing=sw
        profile="portraits/orcs/warrior.webp"
    [/side]

    [side]
        side=4
        team_name=orcs
        user_team_name= _ "team_name^Orcs"
        {RAGGED_FLAG}

        {GOLD 100 120 140}
        {INCOME 12 18 24}
        recruit=Troll,Troll Rocklobber,Troll Whelp,Orcish Grunt,Orcish Warrior,Orcish Archer

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.35}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   offensive}
        [/ai]

        canrecruit=yes
        type=Orcish Sovereign
        id=Eradush
        name= _ "Eradush"
        unrenamable=yes
        facing=sw
        profile="portraits/orcs/grunt-3.webp"
    [/side]

    [side]
        side=5
        team_name=orcs
        user_team_name= _ "team_name^Orcs"
        {RAGGED_FLAG}

        {GOLD 100 120 140}
        {INCOME 12 18 24}
        recruit=Orcish Warrior,Orcish Grunt,Orcish Archer,Orcish Assassin,Goblin Spearman,Goblin Rouser,Goblin Spearman

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.35}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   offensive}
        [/ai]

        canrecruit=yes
        type=Orcish Sovereign
        id=Prirag
        name= _ "Prirag"
        unrenamable=yes
        facing=se
        profile="portraits/orcs/grunt-2.webp"
    [/side]
    # wmllint: validate-on

    {STARTING_VILLAGES 1 3}
    {STARTING_VILLAGES 2 2}
    {STARTING_VILLAGES 3 6}
    {STARTING_VILLAGES 4 8}
    {STARTING_VILLAGES 5 6}

    {CONTINUOUS_SOUND_SOURCE campfire1 11 6 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}
    {CONTINUOUS_SOUND_SOURCE campfire2 21 8 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}
    {CONTINUOUS_SOUND_SOURCE campfire3 36 15 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}

    [event]
        name=prestart
        {MODIFY_UNIT (id="Gwiti Ha'atel") facing nw}
        {MODIFY_UNIT (id="Tanar")         facing nw}

        # Initialize the variable
        {VARIABLE chieftain_bodycount 0}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Complete the Skull of Morgorath")}
            {OBJECTIVE_DEFEAT   ( _ "Destruction of Gwiti Ha’atel")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER}
        )}
    [/event]

    # TODO: lots of patrolling guard units
    # Mainly Wolves, plus some squads of grunts + archers

    [event]
        name=preload
        first_time_only=no

        [lua]
            code=<<
                function before_nati_fail(u)
                    return wesnoth.current.turn < 4
                end
                function after_nati_fail(u)
                    return wesnoth.current.turn > 3
                end
            >>
        [/lua]
    [/event]

    [event]
        name=start
        [message]
            speaker="Gwiti Ha'atel"
            message= _ "One of those three warlords has the skull, though I cannot tell which."
        [/message]

        [message]
            speaker=Tanar
            message= _ "It is a large host they have gathered here. It would be wise to avoid fighting them head on, even if they haven’t united under one banner."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "I may have a way to assassinate the leaders, but we will need to draw away their forces..."
        [/message]

        [unit]
            id="Nati Ha'atel"
            name= _ "Nati Ha’atel"
            type=Nightgaunt
            side=1
            unrenamable=yes
            placement=leader
            facing=nw
            animate=yes
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Hello brother, you will be serving as ingredients today."
        [/message]

        [message]
            speaker=narrator
            message= _ "Some time passes..."
            image="wesnoth-icon.png"
        [/message]

        {DELAY 1000}

        [message]
            speaker="Gwiti Ha'atel"
            message=_ "This potion is powerful as it is going to get. Let’s see the effects."
        [/message]

        [sound]
            name=potion.ogg
        [/sound]

        [color_adjust]
            red=100
            green=100
            blue=100
        [/color_adjust]

        {DELAY 15}

        [color_adjust]
            red=0
            green=0
            blue=0
        [/color_adjust]

        {DELAY 2000}

        {THUNDER (
            [object]
                duration=scenario
                silent=yes
                [filter]
                    id="Gwiti Ha'atel"
                [/filter]
                [effect]
                    apply_to=new_ability
                    [abilities]
                        [hides]
                            id=invisible
                            name= _ "invisible"
                            description= _ "The unit is invisible.

Enemy units cannot see this unit, except if they have units next to it. Any enemy unit that first discovers this unit immediately loses all its remaining movement."
                            affect_self=yes
                            [filter]
                                lua_function="before_nati_fail"
                            [/filter]
                        [/hides]
                        [hides]
                            id=invisible
                            name= _ "mostly invisible"
                            description= _ "The unit is invisible, except during the day.

Enemy units can only see this unit during the day, or if they have units next to it. Any enemy unit that first discovers this unit immediately loses all its remaining movement."
                            affect_self=yes
                            [filter]
                                lua_function="after_nati_fail"
                            [/filter]
                            [filter_self]
                                [filter_location]
                                    time_of_day=chaotic,neutral
                                [/filter_location]
                            [/filter_self]
                        [/hides]
                    [/abilities]
                [/effect]
            [/object]
        )}

        [redraw]
        [/redraw]

        {DELAY 1000}

        [redraw]
        [/redraw]

        [fire_event]
            name=rest_of_starting_cutscene
        [/fire_event]
    [/event]

    [event]
        name=rest_of_starting_cutscene
        [message]
            speaker="Gwiti Ha'atel"
            message= _ "This should ease the retrieval of the skull, but those chieftains will still be hard to get to."
        [/message]

        [message]
            speaker=Tanar
            message= _ "I can distract the patrols, but my clan cannot fight off this horde alone. You must not delay."
        [/message]
    [/event]

    [event]
        name=turn 11
        [message]
            speaker="Nati Ha'atel"
            message= _ "Aaaaaaiiiiiiiiigh!"
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Dear brother, would you be so kind to explain to me why I am visible?"
        [/message]

        [message]
            speaker="Nati Ha'atel"
            message= _ "The light ... weakens me, the magic ... should resume ... at dusk."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Perhaps you aren’t as powerful as you had thought. A lich’s eyes should keep me invisible even during the day."
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id="Nati Ha'atel"
        [/filter]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Go back to the shades, you incompetent fool!"
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Noooo! Not so close to the skull!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id=Tanar
        [/filter]

        [message]
            speaker=unit
            message= _ "My clan will avenge this betrayal!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            side=3,4,5
            canrecruit=yes
        [/filter]

        [switch]
            variable=chieftain_bodycount
            [case]
                value=0
                [message]
                    speaker="Gwiti Ha'atel"
                    message= _ "This chieftain does not have the skull!"
                [/message]
            [/case]
            [case]
                value=1
                [message]
                    speaker="Gwiti Ha'atel"
                    message= _ "Finally! The other half! Let us see what it can do!"
                [/message]

                # TODO:
                # Are we sure about this?
                # Anyhow, the first thing at hand would be to raise the corpse of the dead chief
                {VARIABLE morgorath_side 1}
                {RISE_UP_FIRST_DIALOG}
                {RISE_UP}

                {OBJECTIVES (
                    {OBJECTIVE_VICTORY  ( _ "Kill the last orcish leader")}
                    {OBJECTIVE_DEFEAT   ( _ "Destruction of Gwiti Ha’atel")}
                    {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

                    {TURNS_RUN_OUT}

                    {OBJECTIVE_CARRYOVER}
                )}
            [/case]
            [case]
                value=2
                [role]
                    side=3,4,5
                    type=Orcish Warlord,Orcish Slurbow,Orcish Warrior,Orcish Slayer,Orcish Crossbowman,Orcish Grunt,Orcish Assassin,Orcish Bowman
                    canrecruit=no
                    role=new_leader
                [/role]

                [if]
                    [not]
                        [have_unit]
                            role=new_leader
                        [/have_unit]
                    [/not]
                    [then]
                        [role]
                            side=3,4,5
                            canrecruit=no
                            role=new_leader
                        [/role]
                    [/then]
                [/if]

                [message]
                    role=new_leader
                    message= _ "We surrender, great chief! The horde is yours to command."
                [/message]

                [message]
                    speaker=Tanar
                    message= _ "Tend to the wounded and gather your equipment. We have a campaign to plan."
                [/message]

                {ENDLEVEL_VICTORY yes}
            [/case]
            [else]
                # Complain. This should not happen
                [message]
                    speaker=narrator
                    message= _ "Something is broken, please report."
                    image="wesnoth-icon.png"
                [/message]
            [/else]
        [/switch]
        {VARIABLE_ADD chieftain_bodycount 1}
    [/event]

    [event]
        name=time over
        [if]
            {VARIABLE_NUMERICAL_EQUALS chieftain_bodycount 2}
            [then]
                [message]
                    side=3,4,5
                    canrecruit=yes
                    message= _ "Sound the retreat! But know that I will come for your skull, foul necromancer!"
                [/message]

                {ENDLEVEL_VICTORY yes}
            [/then]
            [else]
                [message]
                    speaker="Gwiti Ha'atel"
                    message= _ "The skull is still out of my reach!"
                [/message]
            [/else]
        [/if]
    [/event]

    [event]
        name=victory
        [store_unit]
            [filter]
                id=Tanar
            [/filter]
            variable=Tanar_store
            kill=no
        [/store_unit]
        [store_unit]
            [filter]
                side=2
                [not]
                    id=Tanar
                [/not]
            [/filter]
            variable=side_2_store
            kill=no
        [/store_unit]

        {CLEAR_VARIABLE chieftain_bodycount}
    [/event]
[/scenario]
