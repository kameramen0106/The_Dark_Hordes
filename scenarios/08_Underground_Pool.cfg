#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=08_Underground_Pool
    name= _ "Underground Pool"
    {MAP 08_Underground_Pool.map}
    victory_when_enemies_defeated=no
    next_scenario=09_Underground_River
    {TURNS 46 42 38}

    {SCENARIO_MUSIC       "underground.ogg"}
    {EXTRA_SCENARIO_MUSIC "transience.ogg"}

    {STORYTXT_UNDERGROUND_POOL}

    {UNDERGROUND}

    [event]
        name=prestart
        [objectives]
            side=1
            [objective]
                condition=win
                description=_ "Move Gwiti or Tanar into the water"
            [/objective]
            [objective]
                condition=lose
                description=_ "Death of Gwiti Ha’atel"
            [/objective]
            [objective]
                condition=lose
                description=_ "Death of Tanar"
            [/objective]
            {TURNS_RUN_OUT}
            [gold_carryover]
                bonus=no
                carryover_percentage=60
            [/gold_carryover]
        [/objectives]
    [/event]

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        shroud=yes

        {NO_STARTING_GOLD}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    [side]
        side=2
        team_name=enemies
        user_team_name= _ "team_name^Dwarves"
        {DWARVISH_FLAG}

        {GOLD 15 25 35}
        {INCOME 4 8 12}
        recruit=Dwarvish Ulfserker,Dwarvish Fighter

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.95}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.45}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   no}
        [/ai]

        canrecruit=yes
        type=Dwarvish Berserker
        id=Peluthlos
        name= _ "Peluthlos"
        unrenamable=yes
        facing=sw

        {GENERIC_UNIT 2 (Dwarvish Steelclad) 21 3}
        {GENERIC_UNIT 2 (Dwarvish Berserker) 18 5}

        [unit]
            type=Giant Spider
            x,y=16,2
            side=2
            upkeep=free
            ai_special=guardian
        [/unit]

        {GENERIC_UNIT 2 (Dwarvish Ulfserker) 11 10}

        {GENERIC_UNIT 2 (Dwarvish Ulfserker) 9 4}
    [/side]

    [side]
        side=3
        team_name=enemies
        user_team_name= _ "team_name^Dwarves"
        {DWARVISH_FLAG}

        {GOLD 30 40 50}
        {INCOME 0 4 8}
        recruit=Dwarvish Fighter,Dwarvish Guardsman

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.95}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.45}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   no}
        [/ai]

        canrecruit=yes
        type=Dwarvish Lord
        id=Geldar
        name= _ "Geldar"
        unrenamable=yes
        facing=se

        {GENERIC_GUARD_UNIT 3 (Dwarvish Steelclad) 22 23}
        {GENERIC_GUARD_UNIT 3 (Dwarvish Steelclad) 7 22}

        {LOYAL_GUARD_UNIT 3 (Dwarvish Fighter) 16 15}
        {LOYAL_GUARD_UNIT 3 (Dwarvish Fighter) 16 24}
    [/side]
    # wmllint: validate-on

    {STARTING_VILLAGES_ALL 3}
    {STARTING_VILLAGES 2 7}

    {CAVE_NOISE_SOUND_SOURCE}

    {CAVE_WATER_SOUND_SOURCE 16 2}

    [event]
        name=prestart

        # wmllint: recognize Tanar
        {RECALL_TANAR}

        {MODIFY_UNIT (id="Gwiti Ha'atel") facing nw}
        {MODIFY_UNIT (id="Tanar")         facing nw}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Move Gwiti or Tanar into the water")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Gwiti Ha’atel")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER_NO_BONUS}
        )}
    [/event]

    [event]
        name=victory
        [message]
            speaker=Tanar
            message= _ "We have come to a flooded part of the cave. If we forge ahead, the Dwarves should be delayed quite a bit."
        [/message]

        {THUNDER ()}

        [message]
            speaker=Tanar
            message= _ "ARGH! What was that?"
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "I do not know. I guess, however, that some magic is at work in these caverns. Can you tell me anything of them?"
        [/message]

        [message]
            speaker=Tanar
            message= _ "Nay, Lord. These passages were flooded higher last time I was here. The Dwarves did not delve here, and we shunned the nameless dread we felt."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "If there is anything to dread here, it is me. Now, onward!"
        [/message]
    [/event]

    [event]
        name=start
        [message]
            speaker="Gwiti Ha'atel"
            message= _ "The Dwarves are still in these caves!"
        [/message]

        [message]
            speaker=Tanar
            message= _ "Aye! They drove us out, and left a guard here to occupy us."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Then we shall slay them. I have never had Dwarves rise to join my ranks. He, he, he, he..."
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            y=1
            x=13-19
            [and]
                id=Tanar
                [or]
                    id="Gwiti Ha'atel"
                [/or]
            [/and]
        [/filter]

        {ENDLEVEL_VICTORY no}
    [/event]

    #a chest of treasure if you bother to go down here
    {TREASURE_CHEST 7 25 (_ "The Hoard of the Dwarves! Three hundred pieces of gold at least!") 300}

    [event]
        name=last breath
        [filter]
            id=Tanar
        [/filter]

        [message]
            speaker=unit
            message= _ "You swore you would protect me!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "I feel the darkness pulling me back..."
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=time over
        [message]
            speaker="Gwiti Ha'atel"
            message= _ "The paladins have caught up with us! We’re trapped!"
        [/message]
    [/event]

    [event]
        name=attack
        [filter]
            side=2,3
        [/filter]
        [filter_second]
            race=orc
        [/filter_second]

        [message]
            speaker=unit
            message= _ "Death! You filthy orcs!"
        [/message]
    [/event]
[/scenario]
