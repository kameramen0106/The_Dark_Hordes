#textdomain wesnoth-The_Dark_Hordes

# wmllint: local spelling Nati

[scenario]
    id=02_Brother_Against_Brother
    name= _ "Brother Against Brother"
    {MAP 02_Brother_Against_Brother.map}
    next_scenario=03_Skull_of_Morgorath
    {TURNS 30 28 26}

    {SCENARIO_MUSIC "revelation.ogg"} {CONTINUE_PLAYING_STORY_MUSIC_FIRST}

    {STORYTXT_BROTHER_AGAINST_BROTHER}

    {DUSK}
    {DUSK}
    {FIRST_WATCH}
    {FIRST_WATCH}
    {FIRST_WATCH}
    {SECOND_WATCH}
    {SECOND_WATCH}
    {SECOND_WATCH}
    {DAWN}
    {DAWN}
    {MORNING}
    {AFTERNOON}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        {GOLD 140 120 100}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    [side]
        side=2
        user_team_name= _ "team_name^Nati"
        {UNDEAD_FLAG}

        {GOLD 120 160 240}
        {INCOME 2 4 8}
#ifdef HARD
        recruit=Dark Adept,Ghost,Blood Bat,Revenant,Bone Shooter
#else
        recruit=Dark Adept,Ghost,Walking Corpse,Vampire Bat,Skeleton,Skeleton Archer
#endif

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.25}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   offensive}
        [/ai]

        canrecruit=yes
        type=Dark Acolyte
        id="Nati Ha'atel"
        name= _ "Nati Ha’atel"
        unrenamable=yes
        facing=nw
        profile="portraits/nati.png"
    [/side]
    # wmllint: validate-on

    {STARTING_VILLAGES 2 10}
    {STARTING_VILLAGES 1 6}

    {CONTINUOUS_SOUND_SOURCE campfire1 16 5 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}
    {CONTINUOUS_SOUND_SOURCE campfire2 10 25 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}

    [event]
        name=prestart
        {MODIFY_UNIT (id="Gwiti Ha'atel") facing se}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Defeat your brother Nati Ha’atel")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Gwiti Ha’atel")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER}
        )}
    [/event]

    [event]
        name=start
        [message]
            speaker=narrator
            message= _ "As the sun set, Gwiti discovered that his arch-rival and brother, Nati, had already ensconced himself nearby."
            image=wesnoth-icon.png
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Ah, hated brother mine. Look well upon the setting sun, for you shall not live to see another in this land."
        [/message]

        [message]
            speaker="Nati Ha'atel"
            message= _ "This land? Do you truly not know where we are? Then you are a greater fool than I had thought."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Cease your blustering, fool, and prepare to die... again."
        [/message]

        [message]
            speaker="Nati Ha'atel"
            message= _ "I will fight you with all my strength to prevent that, and I was always the stronger of us. Flee now and save your miserable hide before I make it a carpet."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Don’t be silly! I’m not hairy enough to be a carpet! But your scalp would make a good pillow."
        [/message]

        {APPEND_MUSIC   "battle.ogg"}
        {APPEND_MUSIC "vengeful.ogg"}
    [/event]

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "What? I can’t die! I already have! Noooo!"
        [/message]

        [message]
            speaker="Nati Ha'atel"
            message= _ "Ha ha ha, did I not tell you it would be so? Perhaps I shall summon your shade to serve me one day. Until then...farewell!"
        [/message]

        [message]
            speaker=unit
            message= _ "It is over. I am doomed."
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id="Nati Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "I...have failed to win this battle. I am defeated. I will not believe it."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Die, yes, die, and go to the Land of the Dead. Perhaps one day you will be back under my command!"
        [/message]

        {ENDLEVEL_VICTORY yes}
    [/event]

    [event]
        name=last breath
        [filter_second]
            id="Gwiti Ha'atel"
        [/filter_second]

        [message]
            speaker=second_unit
            message= _ "Didn’t I tell you so?!"
        [/message]
    [/event]

    [event]
        name=last breath
        [filter_second]
            id="Nati Ha'atel"
        [/filter_second]

        [message]
            speaker=second_unit
            message= _ "And by my own hands you died!"
        [/message]
    [/event]

    [event]
        name=attack
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "I am Gwiti the Mighty, prepare to die!"
        [/message]
    [/event]

    [event]
        name=attack
        [filter]
            id="Nati Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "Now you shall die!"
        [/message]
    [/event]

    [event]
        name=turn 9
        [message]
            speaker="Nati Ha'atel"
            message= _ "You miserable wretch, know that it is only by my mercy that you look upon the sun again, for you shall die before it sets."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "May I remind you that even as we speak, my undead legions are marching towards you?"
        [/message]
    [/event]
[/scenario]
