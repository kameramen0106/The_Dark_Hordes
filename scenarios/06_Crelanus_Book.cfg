#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=06_Crelanus_Book
    name= _ "Crelanu’s Book"
    {MAP 06_Crelanus_Book.map}
    next_scenario=07_Confrontation
    victory_when_enemies_defeated=no
    {TURNS 30 28 26}

    {SCENARIO_MUSIC "wanderer.ogg"}
    {EXTRA_SCENARIO_MUSIC "loyalists.ogg"}

    {STORYTXT_CRELANUS_BOOK}

    {DEFAULT_SCHEDULE_DUSK}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        {NO_STARTING_GOLD}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    [side]
        side=2
        team_name=enemies
        user_team_name= _ "team_name^Elves"
        {ELVISH_FLAG}

        {GOLD 120 140 200}
        {INCOME 0 4 8}
#ifdef HARD
        recruit="Elvish Fighter,Elvish Ranger,Elvish Marksman,Elvish Rider,Elvish Shaman,Elvish Sorceress"
#else
        recruit="Elvish Fighter,Elvish Ranger,Elvish Archer,Elvish Scout,Elvish Shaman"
#endif

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.25}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   no}
        [/ai]

        canrecruit=yes
        type=Elvish Hero
        id=Urind
        name= _ "Urind"
        unrenamable=yes
        facing=sw
    [/side]

    [side]
        side=3
        team_name=enemies
        user_team_name= _ "team_name^Orcs"
        {ELVISH_FLAG}

        {GOLD 120 140 200}
        {INCOME 2 6 10}
#ifdef HARD
        recruit= "Orcish Archer,Orcish Grunt,Wolf Rider,Orcish Assassin,Orcish Crossbowman,Orcish Slayer,Troll"
#else
        recruit= "Orcish Archer,Orcish Warrior,Orcish Grunt,Troll Whelp,Wolf Rider"
#endif

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.25}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   no}
        [/ai]

        canrecruit=yes
        type=Orcish Warrior
        id=Nagou
        name= _ "Nagou"
        unrenamable=yes
        facing=se
        profile="portraits/orcs/warlord.webp"
    [/side]

    [side]
        side=4
        team_name=enemies
        user_team_name= _ "team_name^Enemies"

        controller=null

        no_leader=yes
        hidden=yes
    [/side]
    # wmllint: validate-on

    {STARTING_VILLAGES_ALL 2}

    {STARTING_VILLAGES 3 8}
    {STARTING_VILLAGES 1 3}

    {CONTINUOUS_SOUND_SOURCE campfire1 17 21 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}
    {CONTINUOUS_SOUND_SOURCE campfire2 33 37 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 8}

    [event]
        name=prestart
        {MODIFY_UNIT (id="Gwiti Ha'atel") facing nw}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY   ( _ "Move Gwiti to take the book")}
            {OBJECTIVE_OPTIONAL  ( _ "Kill the elvish leader")}
            {OBJECTIVE_DEFEAT    ( _ "Death of Gwiti Ha’atel")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER}
        )}
    [/event]

    [event]
        name=start
        [message]
            speaker=narrator
            message= _ "Time marched on, and so did Gwiti. He was nearing the place where the dreadful tome of Crelanu was hidden."
            image="wesnoth-icon.png"
        [/message]

#       [message]
#           speaker="Gwiti Ha'atel"
#           message= _ "I feel that it must be close. Could it be in that swamp?"
#       [/message]

        [message]
            speaker=narrator
            message= _ "But the ancient magi had done their job well. The book had been hidden in a grove over which Elves and Orcs had waged war for many years, and any to approach would suffer their combined wrath..."
            image="wesnoth-icon.png"
        [/message]

        [message]
            speaker=Urind
            message= _ "Oh no. The orcs seem to have recruited the undead to their side."
        [/message]

        [message]
            speaker=Nagou
            message= _ "Blast it! However did the elves get a dark sorcerer to march with them?"
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "I side not with either of you!"
        [/message]

        [message]
            speaker=Nagou
            message= _ "A truce, then? I fear he will be the death of us both."
        [/message]

        [message]
            speaker=Urind
            message= _ "Very well. We have hated you Orcs for centuries, but the Undead are a danger to all that live."
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "What? I can’t die! Noooo!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id=Nagou
        [/filter]
        [message]
            speaker=unit
            message= _ "I die a terrible death... not knowing why."
        [/message]
    [/event]

    [event]
        name=last breath
        [filter]
            id=Urind
        [/filter]

        [message]
            speaker=unit
            message= _ "A curse upon that dark sorcerer! Why did he have to come here?!"
        [/message]

        [store_unit]
            variable=elf_loc
            [filter]
                x=$x1
                y=$y1
            [/filter]
            kill=no
        [/store_unit]

        [kill]
            id=Urind
            animate=yes
            fire_event=no
        [/kill]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Rise from the depths of death!"
        [/message]

        [sound]
            name=wail.wav
        [/sound]

        [unit]
            id=Urind
            name= _ "Urind"
            type=Spectre
            unrenamable=yes
            x=$elf_loc.x
            y=$elf_loc.y
            facing=$elf_loc.facing
            side=1
            animate=yes
            attacks_left=0
            moves=0
            resting=no
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]

        {CLEAR_VARIABLE elf_loc}

        [redraw]
            side=1
        [/redraw]

        [message]
            speaker=Urind
            message= _ "Argh! My body is under control..."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "You cannot escape me forever! Well, I must get the book."
        [/message]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY ( _ "Move Gwiti to take the book")}
            {OBJECTIVE_DEFEAT  ( _ "Death of Gwiti Ha’atel")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER}
        )}
    [/event]

    [event]
        name=moveto
        [filter]
            x=14
            y=2
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "At last! This is it! Now I must laugh crazily as a true villain always does!"
        [/message]

        {ENDLEVEL_VICTORY yes}
    [/event]

    [event]
        name=victory
        [unit]
            type=Dragoon
            id=Advance Scout
            generate_name=yes
            x,y=4,18
            random_traits=yes
            side=4
            facing=ne
        [/unit]

        [scroll_to]
            x,y=4,18
        [/scroll_to]

        [message]
            speaker=Advance Scout
            message= _ "My lord, your suspicions were correct. There is indeed a dark sorcerer in this part of the country!"
        [/message]

        [sound]
            name="horse-canter.wav"
        [/sound]

        [kill]
            id=Advance Scout
            animate=no
            fire_event=no
        [/kill]

        [redraw]
        [/redraw]
    [/event]
[/scenario]
