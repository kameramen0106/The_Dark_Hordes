#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=10_Return_to_the_Northlands
    name= _ "Return to the Northlands"
    {MAP 10_Return_to_the_Northlands.map}
    victory_when_enemies_defeated=no
    next_scenario=11_An_Orcish_Coup

    #TODO: balancing
    # this is supposed to be an easy scenario where you can gain gold and veterans
    {TURNS 38 36 34}
    {SCENARIO_MUSIC       "northerners.ogg"} {CONTINUE_PLAYING_STORY_MUSIC_FIRST}
    {EXTRA_SCENARIO_MUSIC "vengeful.ogg"}
    {EXTRA_SCENARIO_MUSIC "the_dangerous_symphony.ogg"}

    {STORYTXT_RETURN_TO_THE_NORTHLANDS}

    {DEFAULT_SCHEDULE}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        team_name=undead
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        fog=yes
        share_view=yes

        {GOLD 200 180 160}
        recruit=Dark Adept,Walking Corpse,Skeleton,Skeleton Archer,Vampire Bat,Ghost,Ghoul

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    [side]
        side=2
        save_id=Tanar
        controller=human
        team_name=undead
        user_team_name= _ "team_name^Tanar"
        {LONG_FLAG}

        fog=yes
        share_view=yes

        {GOLD 220 200 180}
        recruit=Orcish Grunt,Orcish Archer,Orcish Assassin,Wolf Rider

        no_leader=yes
        hidden=no
    [/side]

    [side]
        side=3
        team_name=enemies
        user_team_name= _ "team_name^Orcs"
        {RAGGED_FLAG}

        {GOLD 380 450 520}
        {INCOME 4 8 14}
        recruit=Orcish Grunt,Orcish Archer,Wolf Rider,Goblin Spearman,Orcish Assassin

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.95}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.25}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   no}
        [/ai]

        canrecruit=yes
        type=Orcish Warlord
        id=Vrork
        name= _ "Vrork"
        unrenamable=yes
        facing=se
    [/side]
    # wmllint: validate-on

    {CONTINUOUS_SOUND_SOURCE campfire1 20 5 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 6}
    {CONTINUOUS_SOUND_SOURCE campfire2 19 9 (ambient/campfire.ogg)}
    {SOUND_SOURCE_RANGE 1 6}

    [event]
        name=prestart
#ifdef CAMPAIGN_THE_DARK_HORDES_2
        # create Tanar
        [unit]
            # wmllint: recognize Tanar
            {CHARACTER_STATS_TANAR_AS_LEADER}
            {QUANTITY experience 48 36 24}
            placement=leader
            facing=ne
            side=2
        [/unit]
        [remove_unit_overlay]
            id=Tanar
            image=misc/hero-icon.png
        [/remove_unit_overlay]

        # give the player a bunch of gold to get veterans with
        [gold]
            side=1
            amount=200
        [/gold]
        [gold]
            side=2
            amount=200
        [/gold]
#else
        # wmllint: recognize Tanar
        {RECALL_TANAR}

        [store_unit]
            [filter]
                id=Tanar
            [/filter]
            variable=Tanar_store
            kill=yes
        [/store_unit]

        {VARIABLE Tanar_store.canrecruit yes}
        {VARIABLE Tanar_store.side 2}

        [store_starting_location]
            side=2
            variable=sl
        [/store_starting_location]
        [unstore_unit]
            variable=Tanar_store
            x=$sl.x
            y=$sl.y
        [/unstore_unit]

        [remove_unit_overlay]
            x=$sl.x
            y=$sl.y
            image=misc/hero-icon.png
        [/remove_unit_overlay]

        {CLEAR_VARIABLE Tanar_store,sl}
#endif
        [modify_unit]
            [filter]
                id="Gwiti Ha'atel"
            [/filter]
            type=Demilich
        [/modify_unit]

        {MODIFY_UNIT (id="Gwiti Ha'atel") facing nw}
        {MODIFY_UNIT (id="Tanar")         facing ne}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Kill all enemy units")}
            {OBJECTIVE_DEFEAT   ( _ "Destruction of Gwiti Ha’atel")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER}
        )}
    [/event]

    {STARTING_VILLAGES_ALL 3}

    {STARTING_VILLAGES 1 7}
    {STARTING_VILLAGES 2 7}

    [event]
        name=start
        {CLEAR_FOG 1 22 9 3}

        [message]
            speaker=Vrork
            message= _ "Which cave-orc dares trespass on my land?"
        [/message]

        [message]
            speaker=Tanar
            message= _ "I am Tanar. My clan and I seek passage to the north, by force if need be."
        [/message]

        [message]
            speaker=Vrork
            message= _ "I am the great Vrork! No weakling cave-orc will pass through my lands! Slay them, my grunts!"
        [/message]

        [message]
            speaker=Tanar
            message= _ "My brethren, the enemy we have been yearning to fight has arrived!"
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "It seems I’ll have dead orcs marching with me as well as living ones. He, he he..."
        [/message]

        {UNCLEAR_FOG}
    [/event]

#   [event]
#       name=recruit
#       [filter]
#           type=Ghoul
#       [/filter]
#
#       [message]
#           speaker="Gwiti Ha'atel"
#           message= _ "Crelanu certainly knew some interesting magic!"
#       [/message]
#   [/event]

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "What? I can’t die! Noooo!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id=Tanar
        [/filter]

        [message]
            speaker=unit
            message= _ "My clan will avenge this betrayal!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    #TODO: timeout

    [event]
        name=last breath
        [filter]
            id=Vrork
        [/filter]

        [message]
            speaker=Vrork
            message= _ "No cave-orc can kill me! I am the might Vro..."
        [/message]
    [/event]

    [event]
        name=die
        [filter]
            id=Vrork
        [/filter]
        [filter_second]
            race=orc
        [/filter_second]

        [message]
            speaker=second_unit
            message= _ "I didn’t know surface orcs were this fragile."
        [/message]

        [fire_event]
            name=vrork_die
        [/fire_event]
    [/event]

    [event]
        name=die
        [filter]
            id=Vrork
        [/filter]
        [filter_second]
            [not]
                race=orc
            [/not]
        [/filter_second]

        [message]
            speaker=second_unit
            message= _ "I am no orc!"
        [/message]

        [fire_event]
            name=vrork_die
        [/fire_event]
    [/event]

    [event]
        name=vrork_die
        [store_unit]
            variable=remainder_store
            [filter]
                side=3
                [not]
                    id=Vrork
                [/not]
            [/filter]
        [/store_unit]
        [if]
            [variable]
                name=remainder_store.length
                greater_than_equal_to=4
            [/variable]
            [then]
                [message]
                    side=3
                    message= _ "Those weaklings needed help from the undead to kill our chief! No surrender! Kill them all!"
                [/message]
                [message]
                    speaker="Gwiti Ha'atel"
                    message= _ "Yes! Stay and fight! Give me more corpses to work with!"
                [/message]
            [/then]
        [/if]
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            side=3
        [/filter]

        [store_unit]
            variable=remainder_store
            [filter]
                side=3
                [not]
                    id=Vrork
                [/not]
            [/filter]
        [/store_unit]

        [if]
            [variable]
                name=remainder_store.length
                less_than=4
            [/variable]
            [not]
                [have_unit]
                    id=Vrork
                [/have_unit]
            [/not]
            [then]
                [if]
                    [have_unit]
                        side=3
                    [/have_unit]
                    [then]
                        [message]
                            side=3
                            [not]
                                id=Vrork
                            [/not]
                            message= _ "We are getting slaughtered! Run for your lives!"
                        [/message]

                        [message]
                            speaker="Gwiti Ha'atel"
                            message= _ "Let them run! All shall fear me!"
                        [/message]
                    [/then]
                [/if]

                {CLEAR_VARIABLE remainder_store}

                {ENDLEVEL_VICTORY yes}
            [/then]
        [/if]
    [/event]
[/scenario]
