#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=09x_Inter
    name= _ "Intermission"
    {BLACK_MAP}
    next_scenario=null
    victory_when_enemies_defeated=no

    {STORYTXT_CAMPAIGN_INTERLUDE}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        shroud=yes

        {NO_ECONOMY}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]
    # wmllint: validate-on

    [event]
        name=prestart
        {PUT_TO_RECALL_LIST (id="Gwiti Ha'atel")}
    [/event]

    [event]
        name=start
        [message]
            speaker=narrator
            caption= _ "The Dark Hordes"
            message="" # wmllint: ignore
            image="wesnoth-icon.png"
            [option]
                message= _ "Continue playing to Episode II"
                [command]
                    [endlevel]
                        next_scenario=10_Return_to_the_Northlands
                        result,bonus,save,linger_mode,carryover_report=victory,no,yes,no,no
                        replay_save=no
                        music=silence.ogg
                        {NEW_GOLD_CARRYOVER 100}
                    [/endlevel]
                [/command]
            [/option]
            [option]
                message= _ "End the game"
                [command]
                    [endlevel]
                        result,bonus,save,linger_mode,carryover_report=victory,no,no,no,no
                        replay_save=no
                    [/endlevel]
                [/command]
            [/option]
        [/message]
    [/event]
[/scenario]
