#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=05_Inside_The_Tower
    name= _ "Inside the Tower"
    {MAP 05_Inside_The_Tower.map}
    next_scenario=06_Crelanus_Book
    victory_when_enemies_defeated=no
    {TURNS 60 56 52}

    {SCENARIO_MUSIC "underground.ogg"}
    {EXTRA_SCENARIO_MUSIC "wesnoth-3.ogg"}

    {UNDERGROUND}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        shroud=yes

        {NO_ECONOMY}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    {NO_RECALLS}

    [side]
        side=2
        user_team_name= _ "team_name^Magi"
        {WESNOTH_FLAG}

        {NO_ECONOMY}

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.95}
            {AI_SIMPLE_ALWAYS_ASPECT caution    -0.5}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   no}
        [/ai]

        no_leader=yes
        hidden=yes

        {GENERIC_GUARD_UNIT 2 (Mage)     30 22}
        {GENERIC_GUARD_UNIT 2 (Mage)     31 22}
        {GENERIC_GUARD_UNIT 2 (Mage)     30 23}
        {GENERIC_GUARD_UNIT 2 (Red Mage) 31 23}

        [unit]
            type=Elder Mage
            id=Krimitros
            name= _ "Krimitros"
            x,y=9,6
            random_traits=no
        [/unit]

        {GENERIC_UNIT 2 (Swordsman) 13 29}
        {GENERIC_UNIT 2 (Swordsman) 27 45}

        {GENERIC_UNIT 2 (Spearman)  21 28}
        {GENERIC_UNIT 2 (Spearman)  12 39}
        {GENERIC_UNIT 2 (Spearman)  18 30}
        {GENERIC_UNIT 2 (Spearman)  23 15}

        {GENERIC_UNIT 2 (Red Mage)  16 46}
        {GENERIC_UNIT 2 (Red Mage)  16 10}
        {GENERIC_UNIT 2 (Red Mage)  16 9}
        {GENERIC_UNIT 2 (Mage)      30 6}
    [/side]
    # wmllint: validate-on

    [event]
        name=prestart
        {MODIFY_UNIT (id="Gwiti Ha'atel") facing nw}
        {MODIFY_UNIT (id=Krimitros)       facing ne}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Find Crelanu’s Book")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Gwiti Ha’atel")}

            {TURNS_RUN_OUT}

            {OBJECTIVE_CARRYOVER_NO_BONUS}
        )}
    [/event]

    [event]
        name=start
        [message]
            speaker="Gwiti Ha'atel"
            message= _ "If my memory serves, this tower should have three floors. I should be able to find the Book in a few hours...!"
        [/message]
    [/event]

    [event]
        name=turn 2
        [unit]
            type=Revenant
            id=Xakan
            name= _ "Xakan"
            unrenamable=yes
            x=17
            y=51
            side=1
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [unit]
            type=Revenant
            id=Karae
            name= _ "Karae"
            unrenamable=yes
            x=16
            y=51
            side=1
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [unit]
            type=Revenant
            id=Pezit
            name= _ "Pezit"
            unrenamable=yes
            x=17
            y=52
            side=1
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [unit]
            type=Revenant
            id=Lagon
            name= _ "Lagon"
            unrenamable=yes
            x=14
            y=50
            side=1
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]

#ifdef EASY
        [unit]
            type=Skeleton
            x=20
            y=53
            side=1
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
        [unit]
            type=Skeleton
            x=20
            y=52
            side=1
            [modifications]
                {TRAIT_LOYAL}
            [/modifications]
        [/unit]
#endif

        [message]
            speaker=Karae
            message= _ "Hayaargghh! We have arrived! Command us, Master!"
        [/message]
    [/event]

    #the book
    [item]
        x=3
        y=4
        image=items/book1.png
    [/item]

    #notify the player he's getting closer
    [event]
        name=moveto
        [filter]
            x=21,23,11-34
            y=35,35,30-34
            side=1
        [/filter]

        [message]
            speaker=unit
            message= _ "Here’s he second floor! The mages can’t hide from us for long!"
        [/message]
    [/event]
    [event]
        name=moveto
        [filter]
            x=16-27
            y=10-18
            side=1
        [/filter]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "The third floor! Closer! Find the Book!"
        [/message]
    [/event]

    #a secret passage
    [event]
        name=moveto
        [filter]
            x=11
            y=6
            side=1
        [/filter]

        [message]
            speaker=unit
            message= _ "There’s a secret door here! This must be the library."
        [/message]

        [terrain]
            x=10
            y=6
            terrain=Re
        [/terrain]

        [redraw]
            side=1
        [/redraw]

        [message]
            speaker=Krimitros
            message= _ "I will not allow the likes of you to lay eye upon the Book!"
        [/message]
    [/event]

    {TREASURE_CHEST 30 48 (_ "Well, well, well. Thirty-five pieces of gold were in this chest!") 35}
    {TREASURE_CHEST 30 43 (_ "Blast it, the chest is empty!") 0}
    {TREASURE_CHEST 7  43 (_ "Twenty pieces of gold is a welcome gift.") 20}
    {TREASURE_CHEST 26 50 (_ "I suppose thirty copper coins should not be scorned...") 30}
    {TREASURE_CHEST 9  49 (_ "The chest is empty save for a few trinkets. The magic has gone out of them.") 10}
    {TREASURE_CHEST 10 39 (_ "Gack! This chest contains holy water!") 0}
    {TREASURE_CHEST 29 22 (_ "Look at what the magi were guarding!") 60}
    {TREASURE_CHEST 29 32 (_ "Those magi had hidden away more than it seemed!") 114}
    {TREASURE_CHEST 18 28 (_ "Two dozen gold. Plundering this tower is fun!") 24}
    {TREASURE_CHEST 13 28 (_ "A pile of assorted coins is here!") 23}
    {TREASURE_CHEST 17 25 (_ "Haha, this chest holds scores of gold coins!") 55}

    {ICEPOTION 32 22 object21_icepot}
    {ICEPOTION 22 28 object22_icepot}
    {ICEPOTION 16 46 object23_icepot}
    {ICEPOTION 20 10 object24_icepot}

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "Nooo! Not this close to the book!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id=Krimitros
        [/filter]

        [message]
            speaker=unit
            message= _ "No! The Book must never fall into the hands of a necromancer!"
        [/message]
    [/event]

    [event]
        name=moveto
        [filter]
            id="Gwiti Ha'atel"
            x=3
            y=4
        [/filter]

        [message]
            speaker=unit
            message= _ "This is not the tome Crelanu wrote...hmmm... but it contains its whereabouts!"
        [/message]

        [message]
            speaker=Xakan
            message= _ "We’re done in here! Let’s go slay some more enemies."
        [/message]

        # wmllint: local spelling Susanne

        #Easter Egg: If all the revenants survived, Princess Susanne does a cameo appearance.
        ### 0.8.2: achievements!
        [if]
            [have_unit]
                id=Xakan
            [/have_unit]
            [and]
                [have_unit]
                    id=Karae
                [/have_unit]
            [/and]
            [and]
                [have_unit]
                    id=Pezit
                [/have_unit]
            [/and]
            [and]
                [have_unit]
                    id=Lagon
                [/have_unit]
            [/and]
            [then]
                [message]
                    caption= _ "Susanne"
                    speaker=narrator
                    message= _ "Congratulations! All your revenants survived."
                    image="data/campaigns/Heir_To_The_Throne/images/units/human-princess.png~RC(magenta>red)"
                [/message]

                #this will shut up wmllint warning
                [set_achievement]
                    content_for=the_dark_hordes
                    id=tdh_bone_march #wmllint: ignore
                [/set_achievement]
            [/then]
        [/if]

        {ENDLEVEL_VICTORY no}
    [/event]

    #enemy reinforcements
    [event]
        name=turn 8
        {GENERIC_UNIT 2 (Spearman) 30 10}
        {GENERIC_UNIT 2 (Spearman) 30 6}
    [/event]

    [event]
        name=turn 16
        {GENERIC_UNIT 2 (Mage) 30 10}
        {GENERIC_UNIT 2 (Mage) 30 6}
    [/event]

    [event]
        name=turn 24
        {GENERIC_UNIT 2 (Spearman) 30 10}
        {GENERIC_UNIT 2 (Spearman) 30 6}
    [/event]
[/scenario]
