#textdomain wesnoth-The_Dark_Hordes

[scenario]
    id=09_Underground_River
    name= _ "Underground River"
    {MAP 09_Underground_River.map}
    victory_when_enemies_defeated=no
    next_scenario=09x_Inter

    #The cave should eventually flood completely except for the dwarvish part
    turns=unlimited
    {SCENARIO_MUSIC       "the_deep_path.ogg"}
    {EXTRA_SCENARIO_MUSIC "wesnoth-3.ogg"}

    {STORYTXT_UNDERGROUND_RIVER}

    {UNDERGROUND}

    # wmllint: validate-off
    [side]
        side=1
        controller=human
        user_team_name= _ "team_name^Gwiti"
        {UNDEAD_FLAG}

        shroud=yes

        {NO_STARTING_GOLD}

        # wmllint: recognize Gwiti Ha'atel
        {CHARACTER_STATS_GWITI}
    [/side]

    [side]
        side=2
        user_team_name= _ "team_name^Dwarves"
        {DWARVISH_FLAG}

        {GOLD 50 150 250}
        {INCOME 5 15 25}
#ifndef HARD
        recruit=Dwarvish Fighter,Dwarvish Guardsman,Dwarvish Thunderer,Dwarvish Ulfserker
#else
        recruit=Dwarvish Fighter,Dwarvish Guardsman,Dwarvish Thunderer,Dwarvish Ulfserker,Dwarvish Steelclad,Dwarvish Stalwart,Dwarvish Thunderguard
#endif

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    0.25}
            {AI_SIMPLE_ALWAYS_ASPECT grouping   offensive}
        [/ai]

        canrecruit=yes
        type=Dwarvish Lord
        id=Ainarthol
        name= _ "Ainarthol"
        unrenamable=yes
        facing=sw

        {LOYAL_GUARD_UNIT 2 (Dwarvish Guardsman) 2 15}
        {LOYAL_GUARD_UNIT 2 (Dwarvish Guardsman) 4 20}
        {LOYAL_GUARD_UNIT 2 (Dwarvish Thunderer) 7 13}

        {LOYAL_GUARD_UNIT 2 (Dwarvish Fighter) 10 20}
        {LOYAL_GUARD_UNIT 2 (Dwarvish Fighter) 13 15}

#ifndef EASY
        {GENERIC_UNIT 2 (Dwarvish Fighter) 12 17}
        {GENERIC_UNIT 2 (Dwarvish Fighter)  7 10}
#endif
#ifdef HARD
        {GENERIC_UNIT 2 (Dwarvish Thunderguard) 14 9}
        {GENERIC_UNIT 2 (Dwarvish Steelclad)    1 13}
#endif
    [/side]

    [side]
        side=3
        user_team_name= _ "team_name^Naga"
        {DWARVISH_FLAG}

        {GOLD 50 150 250}
        {INCOME 5 15 25}
#ifdef EASY
        recruit=Naga Fighter,Naga Dirkfang
#else
        recruit=Naga Fighter,Naga Warrior,Naga Dirkfang,Naga Ringcaster
#endif

        {ai/aliases/stable_singleplayer.cfg}
        [ai]
            #The intention is that the nagas don't leave the water,
            # but are very aggressive otherwise.
            #If you have settings that work better (on a non-broken AI),
            # feel free to change this.

            {AI_SIMPLE_ALWAYS_ASPECT aggression 0.75}
            {AI_SIMPLE_ALWAYS_ASPECT caution    2.50}

            {AI_SIMPLE_ALWAYS_ASPECT passive_leader yes}
            {AI_SIMPLE_ALWAYS_ASPECT village_value 0}
        [/ai]

        canrecruit=yes
        type=Naga Myrmidon
        id=Xoloss
        name= _ "Xoloss"
        unrenamable=yes
        facing=nw
    [/side]

    {STARTING_VILLAGES 2 10}
    {STARTING_VILLAGES 3 5}

    {CAVE_NOISE_SOUND_SOURCE}

    {CAVE_WATER_SOUND_SOURCE 14 15}
    {CAVE_WATER_SOUND_SOURCE 3 27}

    [event]
        name=prestart
        {CAPTURE_VILLAGE 2 10 20}
        {CAPTURE_VILLAGE 2 12 17}
        {CAPTURE_VILLAGE 2 13 15}

        {CAPTURE_VILLAGE 2 7 13}
        {CAPTURE_VILLAGE 2 2 15}
        {CAPTURE_VILLAGE 2 7 10}
        {CAPTURE_VILLAGE 2 14 9}
        {CAPTURE_VILLAGE 2 1 13}

        # wmllint: recognize Tanar
        {RECALL_TANAR}

        {MODIFY_UNIT (id="Gwiti Ha'atel") facing nw}
        {MODIFY_UNIT (id="Tanar")         facing nw}

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Take over the dwarven castle")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Gwiti Ha’atel")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

            {HAS_NO_TURN_LIMIT}

            {OBJECTIVE_CARRYOVER_NO_BONUS}

            {OBJECTIVE_NOTE     ( _ "Your castle will sink at the start of turn 4.")}
        )}
    [/event]

    [event]
        name=start
        [message]
            speaker=Tanar
            message= _ "The water is rising behind us, it seems to be going back to its normal level."
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "That should keep the dwarves and humans away. Let’s see what else these caves contain."
        [/message]
    [/event]

    [event]
        name=turn 4
        {THUNDER (
            [terrain]
                x=5,4-6,5-7
                y=33,32,31
                terrain=Ww
            [/terrain]
        )}

        [message]
            speaker=Tanar
            message= _ "Our castle has sunk!"
        [/message]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "Maybe the midgets were running from the water... no matter, we can only move forward."
        [/message]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Take over the dwarven castle")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Gwiti Ha’atel")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

            {HAS_NO_TURN_LIMIT}

            {OBJECTIVE_CARRYOVER_NO_BONUS}
        )}
    [/event]

#define ISLAND_COORDINATES
    x=11-17,17,18-25
    y=1-5,6-7,1-11
#enddef

    [event]
        name=moveto
        [filter]
            side=1
            {ISLAND_COORDINATES}
        [/filter]

        [message]
            speaker="Gwiti Ha'atel"
            message= _ "The water will not flood past this chasm, get across and clear out the dwarves!"
        [/message]

        [message]
            speaker=Tanar
            message= _ "Aye! Kill the dwarves!"
        [/message]

        {OBJECTIVES (
            {OBJECTIVE_VICTORY  ( _ "Wipe out enemies in the vicinity")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Gwiti Ha’atel")}
            {OBJECTIVE_DEFEAT   ( _ "Death of Tanar")}

            {HAS_NO_TURN_LIMIT}

            {OBJECTIVE_CARRYOVER_NO_BONUS}
        )}
    [/event]

    [event]
        name=die
        first_time_only=no
        [filter]
            side=2,3
        [/filter]
        [if]
            [have_unit]
                id="Gwiti Ha'atel"
                {ISLAND_COORDINATES}
            [/have_unit]
            [and]
                [have_unit]
                    id=Tanar
                    {ISLAND_COORDINATES}
                [/have_unit]
            [/and]
            [not]
                [have_unit]
                    side=2,3
                    {ISLAND_COORDINATES}
                [/have_unit]
            [/not]
            [then]
                [kill]
                    x=$x1
                    y=$y1
                    animate=no
                    fire_event=no
                [/kill]

                [message]
                    speaker=Tanar
                    message= _ "We have cleared the area, Lord."
                [/message]

                [message]
                    speaker="Gwiti Ha'atel"
                    message= _ "Block the entrances. We will be safe here for a while. Now I have to study the book."
                [/message]

                [message]
                    speaker=narrator
                    caption= _ "End of Episode I"
                    message= _ "Gwiti’s adventure will continue in Episode II."
                    image="wesnoth-icon.png"
                [/message]

                {ENDLEVEL_VICTORY no}
            [/then]
        [/if]
    [/event]

#undef ISLAND_COORDINATES

    [event]
        name=new turn
        first_time_only=no
        #This event will do the following
        #-turn all (shallow/ reef) water adjacent to at least 1 hex of deep water into deep water
        #-kill all units on these hexes that can't swim (not undead, not naga)
        #-turn all hexes adjacent to at least 2 hexes of water into:
        # -rockbound cave: reef
        # -default: shallow water
        #
        #This may not be the best way to go about flooding the cave, suggestions welcome.
        [store_locations]
            variable=deepwater
            terrain=Ww,Wwr
            [filter_adjacent_location]
                count=1-6
                terrain=Wo
            [/filter_adjacent_location]
        [/store_locations]

        #There HAS to be a better way to do this...
        {FOREACH deepwater i}
            [terrain]
                x=$deepwater[$i].x
                y=$deepwater[$i].y
                terrain=Wo
            [/terrain]
        {NEXT i}

        [redraw]
            side=1
        [/redraw]

        [kill]
            [not]
                race=undead
            [/not]
            [not]
                race=naga
            [/not]
            [not]
                race=bats
            [/not]
            [filter_location]
                terrain=Wo
            [/filter_location]
            animate=yes
            fire_event=yes
        [/kill]

        [store_locations]
            variable=newwater
            terrain=Uu,Uu^Ii,Uue,Ur,Ur^Ii,Urb,Uu^Vu,Uu^Vud,Uh,Uh^Ii,Uhe,Cud,Kud
            [not]
                x,y=5,33
            [/not]
            [filter_adjacent_location]
                count=2-6
                terrain=Ww,Wo,Wwr,Ww^Vm,Chw,Khw
            [/filter_adjacent_location]
        [/store_locations]

        {FOREACH newwater i}
            [if]
                [variable]
                    name=newwater[$i].terrain
                    equals=Uh
                [/variable]
                [then]
                    [terrain]
                        x=$newwater[$i].x
                        y=$newwater[$i].y
                        terrain=Wwr
                    [/terrain]
                [/then]
                [else]
                    [terrain]
                        x=$newwater[$i].x
                        y=$newwater[$i].y
                        terrain=Ww
                    [/terrain]
                [/else]
            [/if]
        {NEXT i}

        [redraw]
            side=1
        [/redraw]

        {CLEAR_VARIABLE (deepwater,newwater) }
    [/event]

    [event]
        name=last breath
        [filter]
            id=Tanar
        [/filter]

        [message]
            speaker=unit
            message= _ "My clan will avenge this betrayal!"
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]

    [event]
        name=last breath
        [filter]
            id="Gwiti Ha'atel"
        [/filter]

        [message]
            speaker=unit
            message= _ "Curse you dwarves! Curse you nagas! You will all die in this cave!"
        [/message]

        {QUAKE rumble.ogg}

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "With the power of the book, Gwiti collapsed the cave and brought down part of the mountain. Even some of the pursuing paladins were caught in the rubble."
        [/message]

        {ENDLEVEL_DEFEAT}
    [/event]
[/scenario]
