#textdomain wesnoth-The_Dark_Hordes

[unit_type]
    id="Dark Spirit"
    name= _ "Dark Spirit"
    race="undead"
    image="units/undead-spirit/darkspirit.png"
    hitpoints=46
    movement_type=undeadspirit
    movement=9
    experience=150
    level=3
    alignment=chaotic
    advances_to=null
    {AMLA_DEFAULT}
    cost=60
    usage="scout"
    description= _ "Dark Spirits are messengers and bearers of tidings from the realm of the dead, and a force of dread in this world. Luckily, they have rarely been seen in Wesnoth."
    die_sound=wail-long.wav
    [death]
        [frame]
            begin=0
            end=200
            image="units/undead-spirit/darkspirit-die-1.png"
        [/frame]
        [frame]
            begin=200
            end=400
            image="units/undead-spirit/darkspirit-die-2.png"
        [/frame]
    [/death]
    [attack]
        name="baneblade"
        description={STR_BANEBLADE}
        type=arcane
        range=melee
        damage=9
        number=4
        [specials]
            {WEAPON_SPECIAL_DRAIN}
        [/specials]
        icon="attacks/baneblade.png"
    [/attack]
    [attack]
        name="wail"
        description={STR_WAIL}
        type=cold
        range=ranged
        damage=9
        number=2
        icon="attacks/wail.png"
    [/attack]
    [attack_anim]
        [filter_attack]
            name=baneblade
        [/filter_attack]
        start_time=-500
        offset=0.0~1.0:425,0.0:225
        alpha=0.8~0.0:425,0.0~0.8:225
        [frame]
            duration=200
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=200
            image="units/undead-spirit/darkspirit.png"
            sound=wail-sml.wav
        [/frame]
        [if]
            hits=yes
            [frame]
                duration=100
                image="units/undead-spirit/darkspirit-attack-melee.png"
                sound={SOUND_LIST:SWORD_SWISH}
            [/frame]
        [/if]
        [else]
            hits=no
            [frame]
                duration=100
                image="units/undead-spirit/darkspirit-attack-melee.png"
                sound={SOUND_LIST:MISS}
            [/frame]
        [/else]
        [frame]
            duration=100
            image="units/undead-spirit/darkspirit.png"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=wail
        [/filter_attack]
        {MISSILE_FRAME_WAIL}
        [if]
            hits=no
            [frame]
                begin=-100
                end=100
                image="units/undead-spirit/darkspirit-attack-ranged.png"
                sound=wail-sml.wav
            [/frame]
        [/if]
        [else]
            hits=yes
            [frame]
                begin=-100
                end=100
                image="units/undead-spirit/darkspirit-attack-ranged.png"
                sound=wail.wav
            [/frame]
        [/else]
    [/attack_anim]
    [defend]
        start_time=-126
        [if]
            hits=hit,kill
            offset=0.0~-0.05:126,-0.05~0.0:126
            alpha=0.8~0.5:126,0.5~0.8:126
            [frame]
                duration=1
                image="units/undead-spirit/darkspirit.png"
            [/frame]
            [frame]
                duration=100
                image="units/undead-spirit/darkspirit.png"
            [/frame]
            [frame]
                duration=150
                image="units/undead-spirit/darkspirit-defend.png"
                sound=wail.wav
            [/frame]
            [frame]
                duration=1
                image="units/undead-spirit/darkspirit.png"
            [/frame]
        [/if]
        [else]
            hits=miss
            offset=0.0~-0.1:126,-0.1~0.0:126
            alpha=0.8~0.25:126,0.25~0.8:126
            [frame]
                duration=1
                image="units/undead-spirit/darkspirit.png"
            [/frame]
            [frame]
                duration=100
                image="units/undead-spirit/darkspirit.png"
            [/frame]
            [frame]
                duration=150
                image="units/undead-spirit/darkspirit-defend.png"
            [/frame]
            [frame]
                duration=1
                image="units/undead-spirit/darkspirit.png"
            [/frame]
        [/else]
    [/defend]
    [standing_anim]
        start_time=0
        alpha=0.8~0.4:1400,0.4~0.6:600,0.6~0.4:600,0.4~0.8:1400
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
