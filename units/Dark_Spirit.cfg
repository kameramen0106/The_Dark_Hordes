        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
            duration=250
            image="units/undead-spirit/darkspirit.png"
        [/frame]
        [frame]
