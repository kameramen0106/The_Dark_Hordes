#textdomain wesnoth-The_Dark_Hordes
#
# Some codes, such as campaign definitions and some unit definitions,
# are taken from Invasion from the Unknown and After the Storm.
#

# wmlscope: set export=no
# wmlindent: start ignoring

# Add an instruction to ignore to avoid wmllint warnings.
# wmllint: validate-off

# Wesnoth textdomain setup
[textdomain]
    name="wesnoth-The_Dark_Hordes"
    path="data/add-ons/The_Dark_Hordes/translations"
[/textdomain]

#undef TDH_SHARED_ATTRIBUTES

#
# This is campaign definitions macros. 
# Note that these are special, unlike the regular ones.
#

#define TDH_SHARED_DESCRIPTION_FOOTER
"

<span color='#888'>"+
_"Version"+" {~add-ons/The_Dark_Hordes/metadatas/VERSION} "+{TDH_WESNOTH_VERSION_SUPPORT_STATUS}+"
"+_"Feedback and bug reports:"+" https://r.wesnoth.org/t58445"+"</span>" #enddef

#ifver WESNOTH_VERSION < 1.19.0
#define TDH_WESNOTH_VERSION_SUPPORT_STATUS
    _ "for Wesnoth 1.18.0 and later" #enddef
#else
#define TDH_WESNOTH_VERSION_SUPPORT_STATUS
    _ "for Wesnoth 1.19.0 and later (NOT SUPPORTED YET!)" #enddef
#endif

#define TDH_SHARED_ATTRIBUTES EPISODE_ID_SUFFIX EPISODE_SUBTITLE EPISODE_DESCRIPTION
    id=The_Dark_Hordes_{EPISODE_ID_SUFFIX}
    define=CAMPAIGN_THE_DARK_HORDES
    {ENABLE_DEATH_KNIGHT}
    {ENABLE_ANCIENT_LICH}
    {DISABLE_GRAND_MARSHAL}
    version={~add-ons/The_Dark_Hordes/metadatas/VERSION}
    abbrev=_"TDH"
    end_text= _ "To be continued..."
    name= _ "The Dark Hordes"+"
"+{EPISODE_SUBTITLE}
    description={EPISODE_DESCRIPTION}+{TDH_SHARED_DESCRIPTION_FOOTER}
    # Credits data source
    {~add-ons/The_Dark_Hordes/about.cfg}
#enddef

#define TDH_DIFFICULTY_MENU_ENTRY _SYMBOL _ICON _LABEL _DESC _DEFAULT
    [difficulty]
        define={_SYMBOL}
        image={_ICON}+"~RC(magenta>red)"
        label={_LABEL}
        description={_DESC}
        default={_DEFAULT}
    [/difficulty]
#enddef

#define TDH_DIFFICULTY_MENU _EASY_LABEL _EASY_ICON _NORMAL_LABEL _NORMAL_ICON _HARD_LABEL _HARD_ICON
    {TDH_DIFFICULTY_MENU_ENTRY EASY   ({_EASY_ICON})   ({_EASY_LABEL})   ( _ "Easy")   no }
    {TDH_DIFFICULTY_MENU_ENTRY NORMAL ({_NORMAL_ICON}) ({_NORMAL_LABEL}) ( _ "Normal") yes}
    {TDH_DIFFICULTY_MENU_ENTRY HARD   ({_HARD_ICON})   ({_HARD_LABEL})   ( _ "Hard")   no }
#enddef

[campaign]
    {TDH_SHARED_ATTRIBUTES 1 ( _ "Episode I") ( _ "Lead fugitive dark sorcerer Gwiti Haâ€™atel to mastery of the undead hordes.

(Intermediate level, 9 scenarios.)")}
    first_scenario=01_A_New_Chance
    start_year="1095 YW"
    end_year="1097 YW"
    icon="units/undead-spirit/shadow-s-3.png~RC(magenta>red)"
    background="data/campaigns/The_Rise_Of_Wesnoth/images/story/trow_story_06-Temple_in_the_Deep.webp"
    {TDH_DIFFICULTY_MENU
    ( _ "difficulty_menu^Apprentice") ("data/add-ons/The_Dark_Hordes/images/units/undead-necromancers/initiate.png")
    ( _ "difficulty_menu^Master")     ("data/add-ons/The_Dark_Hordes/images/units/undead-necromancers/dark-acolyte.png")
    ( _ "difficulty_menu^Dark Lord")  ("data/add-ons/The_Dark_Hordes/images/units/undead-necromancers/dread-lich.png")
    }
[/campaign]
[campaign]
    {TDH_SHARED_ATTRIBUTES 2 ( _ "Episode II") ( _ "Lead fugitive dark sorcerer Gwiti Haâ€™atel to mastery of the undead hordes.

(Unfinished, 3 scenarios completed.)")}
    extra_defines=CAMPAIGN_THE_DARK_HORDES_2
    first_scenario=10_Return_to_the_Northlands
    start_year="1098 YW"
    end_year="1100 YW"
    icon="units/undead-spirit/nightgaunt-standing-s-2.png~RC(magenta>red)"
    background="data/campaigns/The_Rise_Of_Wesnoth/images/story/trow_story_03-A_Harrowing_Escape.webp"
    {TDH_DIFFICULTY_MENU
    ( _ "difficulty_menu^Unpleasant") ("units/undead-skeletal/skeleton/skeleton-idle-2.png")
    ( _ "difficulty_menu^Corrupt")    ("units/undead-skeletal/revenant/revenant-defend-2.png")
    ( _ "difficulty_menu^Diabolic")   ("units/undead-skeletal/deathknight.png")
    }
[/campaign]

#undef TDH_SHARED_ATTRIBUTES
#undef TDH_DIFFICULTY_MENU
#undef TDH_DIFFICULTY_MENU_ENTRY
#undef TDH_WESNOTH_VERSION_SUPPORT_STATUS
#undef TDH_SHARED_DESCRIPTION_FOOTER

# wmllint: validate-on

#ifdef CAMPAIGN_THE_DARK_HORDES
#
# Initialize the macro elements once.
#
#undef LDR_PATH

# wmlindent: start ignoring
#define LDR_PATH
add-ons/The_Dark_Hordes#enddef
# wmlindent: stop ignoring

# Data directory
[binary_path]
    path="data/{LDR_PATH}"
[/binary_path]

{~{LDR_PATH}/base-loader.cfg}
#endif

# wmllint: directory spellings Gwiti Ha'atel Leganoth Morgorath
# wmllint: directory spellings Tanar
